


networks:
  app-network:
    driver: bridge

volumes:
  db-data:

services:

  # ── Base de Datos ──
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── pgAdmin ──
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_panel
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  # ── Backend (Node.js + Express) ──
  web:
    build: ./app
    container_name: express_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - PORT=5000
    ports:
      - "5000:5000"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (Nginx) ──
  frontend:
    build: ./frontend
    container_name: nginx_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - app-network
    depends_on:
      web:
        condition: service_healthy
